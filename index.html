<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix-Your AI</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4F5FFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Matrix">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
  :root{
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --surface-2: #F1F0EC;
    --border: #E4E2DC;
    --text: #17181D;
    --text-muted: #6E6F76;
    --accent: #6A4DFF;
    --accent-hover: #5B3EF0;
    --accent-soft: #EFEBFF;
    --accent-2: #FFB454;
    --user-bubble: #6A4DFF;
    --user-text: #FFFFFF;
    --assistant-bubble: #FFFFFF;
    --danger: #E5484D;
    --radius: 12px;
    --sidebar-w: 280px;
    --font-display: "Space Grotesk", "Inter", sans-serif;
    --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
  }
  [data-theme="dark"]{
    --bg: #121218;
    --surface: #1B1B24;
    --surface-2: #23232F;
    --border: #34343F;
    --text: #EDEDF2;
    --text-muted: #93939F;
    --accent: #8C74FF;
    --accent-hover: #9C86FF;
    --accent-soft: #262238;
    --accent-2: #FFC069;
    --user-bubble: #8C74FF;
    --user-text: #14131C;
    --assistant-bubble: #1F1F2B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }
  .app{ display:flex; height:100vh; height:100dvh; }

  .sidebar{
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display:flex;
    flex-direction:column;
    flex-shrink:0;
    transition: margin-left .2s ease;
    overflow-y:auto;
  }
  .sidebar.collapsed{ margin-left: calc(-1 * var(--sidebar-w)); }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding:18px 16px 8px;
    font-family: var(--font-display);
    font-weight:700; font-size:19px; letter-spacing:-0.01em;
  }
  .brand-mark{
    width:26px; height:26px; border-radius:8px;
    object-fit: cover;
    flex-shrink:0;
  }
  .new-chat{
    margin:12px 16px 8px; padding:10px 14px;
    background: var(--accent); color:#fff;
    border:none; border-radius: var(--radius);
    font-weight:600; font-size:14px; cursor:pointer;
    display:flex; align-items:center; gap:8px;
  }
  .new-chat:hover{ background: var(--accent-hover); }
  .search-box{ margin: 0 16px 8px; }
  .search-box input{
    width:100%; padding:8px 10px; border-radius:9px; border:1px solid var(--border);
    background: var(--surface-2); color:var(--text); font-size:13px;
  }
  .conv-list{ flex:1; overflow-y:auto; min-height:0; padding:4px 10px; }
  .conv-item{
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 10px; border-radius:10px; cursor:pointer;
    font-size:13.5px; color:var(--text-muted);
    margin-bottom:2px; gap:6px;
  }
  .conv-item span.title{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .conv-item input.rename-input{
    flex:1; background:var(--surface-2); border:1px solid var(--accent);
    border-radius:6px; font-size:13.5px; color:var(--text); padding:2px 6px;
    font-family:inherit;
  }
  .conv-item:hover{ background: var(--surface-2); }
  .conv-item.active{ background: var(--accent-soft); color:var(--text); font-weight:600; }
  .conv-item .row-actions{ display:flex; gap:2px; opacity:0; flex-shrink:0; }
  .conv-item:hover .row-actions{ opacity:1; }
  .conv-item .row-actions button{
    border:none; background:none; color:var(--text-muted);
    cursor:pointer; font-size:12.5px; padding:2px 4px;
  }
  .conv-item .bulk-check{ flex-shrink:0; cursor:pointer; }
  .conv-item .row-actions button:hover{ color: var(--text); }
  .conv-item .row-actions button.pinned{ color: var(--accent); opacity:1; }
  .conv-item .msg-time{ font-size:10.5px; color: var(--text-muted); margin-left:8px; opacity:.75; flex-shrink:0; }
  .empty-search{ padding:14px 10px; font-size:12.5px; color:var(--text-muted); text-align:center; }

  .sidebar-footer{
    padding:12px 16px; border-top:1px solid var(--border);
    display:flex; flex-direction:column; gap:8px;
  }
  .sidebar-footer label{ font-size:11px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .sidebar-footer input, .sidebar-footer select{
    width:100%; padding:8px 10px; border-radius:9px; border:1px solid var(--border);
    background: var(--surface-2); color:var(--text); font-size:13px;
  }
  .theme-toggle, .instructions-btn{
    background:none; border:1px solid var(--border); border-radius:9px;
    padding:7px; cursor:pointer; color:var(--text-muted); font-size:13px;
  }
  .made-by{
    text-align:center; font-size:11px; color: var(--text-muted);
    padding-top:4px; opacity:.8;
  }

  .main{ flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }
  .topbar{
    display:flex; align-items:center; gap:12px;
    padding:12px 20px; border-bottom:1px solid var(--border);
  }
  .icon-btn{
    background:none; border:none; cursor:pointer; color:var(--text-muted);
    font-size:18px; padding:4px;
  }
  .topbar .chat-title{ font-weight:600; font-size:15px; flex:1; }
  .export-btn{
    background:none; border:1px solid var(--border); border-radius:9px;
    padding:6px 10px; cursor:pointer; color:var(--text-muted); font-size:12.5px;
  }
  .export-btn:hover{ color:var(--text); }

  .messages{ flex:1; overflow-y:auto; padding: 24px 0 12px; position:relative; }
  .msg-row{
    max-width: 760px; margin: 0 auto var(--msg-gap, 20px); padding: 0 20px;
    display:flex; gap:12px;
  }
  .msg-row.user{ flex-direction:row-reverse; }
  .avatar{
    width:30px; height:30px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700; color:#fff;
  }
  .avatar.user{ background: var(--user-bubble); color: var(--user-text); }
  .avatar.assistant{ background: linear-gradient(135deg, var(--accent), #9B7CFF); }
  .bubble-col{ display:flex; flex-direction:column; max-width:640px; }
  .msg-row.user .bubble-col{ align-items:flex-end; }
  .bubble{
    padding: var(--msg-padding, 11px 15px); border-radius: var(--radius);
    font-size: var(--msg-font-size, 14.5px); line-height:1.6;
    word-wrap:break-word;
  }
  .char-counter{
    text-align:right; font-size:11px; color:var(--text-muted); max-width:760px;
    margin: 2px auto 0; padding: 0 4px;
  }
  .speak-btn.speaking{ color: var(--accent); }
  .msg-row.user .bubble{ background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius:4px;}
  .msg-row.assistant .bubble{ background: var(--assistant-bubble); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .bubble pre{
    background:#0F1117; color:#E5E7EB; padding:12px 12px; border-radius:10px;
    overflow-x:auto; font-size:13px; margin:8px 0; position:relative;
  }
  .bubble code{ font-family: var(--font-mono); }
  .bubble :not(pre) > code{ background: var(--surface-2); padding:2px 5px; border-radius:5px; font-size:.9em;}
  .code-wrap{ position:relative; }
  .code-copy-btn{
    position:absolute; top:6px; right:6px; background:rgba(255,255,255,.1);
    color:#E5E7EB; border:1px solid rgba(255,255,255,.2); border-radius:6px;
    font-size:11px; padding:3px 8px; cursor:pointer;
  }
  .code-copy-btn:hover{ background:rgba(255,255,255,.2); }

  .md-h1{ font-size:1.25em; font-weight:700; margin:.4em 0 .2em; }
  .md-h2{ font-size:1.12em; font-weight:700; margin:.4em 0 .2em; }
  .md-h3{ font-size:1.03em; font-weight:700; margin:.3em 0 .2em; }
  .md-p{ margin:0 0 .5em; }
  .md-p:last-child{ margin-bottom:0; }
  .md-list{ margin:.3em 0 .5em; padding-left:1.3em; }
  .md-list li{ margin-bottom:.15em; }
  .md-table{ border-collapse:collapse; margin:.5em 0; font-size:13px; width:100%; }
  .md-table th, .md-table td{ border:1px solid var(--border); padding:6px 8px; text-align:left; }
  .md-table th{ background: var(--surface-2); }

  .attachments{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px; }
  .attachments img{ width:64px; height:64px; object-fit:cover; border-radius:8px; border:1px solid var(--border); cursor:pointer; }
  .attachment-chip{
    font-size:11.5px; background:var(--surface-2); border:1px solid var(--border);
    border-radius:8px; padding:4px 8px; color:var(--text-muted);
  }

  .msg-actions{ display:flex; gap:10px; margin-top:6px; align-items:center; }
  .msg-time{ font-family: var(--font-mono); font-size:10.5px; color: var(--text-muted); opacity:.7; }
  .msg-actions button{
    background:none; border:none; color:var(--text-muted); font-size:12px;
    cursor:pointer; opacity:.7;
  }
  .msg-actions button:hover{ opacity:1; color:var(--text); }

  .edit-box textarea{
    width:100%; min-width:280px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-family:inherit; font-size:14.5px;
    padding:10px; resize:vertical; min-height:60px;
  }
  .edit-actions{ display:flex; gap:8px; margin-top:6px; justify-content:flex-end; }
  .edit-actions button{
    border:none; border-radius:8px; padding:6px 12px; font-size:12.5px; cursor:pointer; font-weight:600;
  }
  .edit-actions .save-btn{ background:var(--accent); color:#fff; }
  .edit-actions .cancel-btn{ background:var(--surface-2); color:var(--text-muted); }

  .empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--text-muted); text-align:center; gap:10px; padding:20px;
    position:relative; overflow:hidden;
  }
  .empty-state canvas{
    position:absolute; inset:0; width:100%; height:100%; z-index:0; opacity:.55;
  }
  .empty-state .empty-content{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .empty-state h1{ font-family: var(--font-display); font-size:26px; font-weight:700; color:var(--text); margin:0; letter-spacing:-0.01em; }
  .suggestions{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:600px; margin-top:10px;}
  .suggestion{
    border:1px solid var(--border); background:var(--surface); padding:10px 14px;
    border-radius:12px; font-size:13px; cursor:pointer; color:var(--text);
  }
  .suggestion:hover{ background: var(--surface-2); }

  .typing{ display:flex; gap:4px; padding:6px 0; }
  .typing span{
    width:6px; height:6px; border-radius:50%; background: var(--text-muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{ transform:translateY(0); opacity:.5;} 30%{ transform:translateY(-4px); opacity:1;} }

  .scroll-bottom-btn{
    position:absolute; bottom:96px; left:50%; transform:translateX(-50%);
    background:var(--surface); border:1px solid var(--border); border-radius:50%;
    width:36px; height:36px; box-shadow:0 2px 10px rgba(0,0,0,.15); cursor:pointer;
    display:none; align-items:center; justify-content:center; z-index:5; color:var(--text);
  }

  .composer{ padding:14px 20px 20px; }
  .pending-attachments{
    max-width:760px; margin:0 auto 8px; display:flex; gap:8px; flex-wrap:wrap;
  }
  .pending-attachment{
    display:flex; align-items:center; gap:6px; background:var(--surface);
    border:1px solid var(--border); border-radius:10px; padding:5px 8px; font-size:12px;
  }
  .pending-attachment img{ width:28px; height:28px; object-fit:cover; border-radius:5px; }
  .pending-attachment button{ border:none; background:none; color:var(--text-muted); cursor:pointer; font-size:13px; }

  .composer-inner{
    max-width:760px; margin:0 auto;
    display:flex; align-items:flex-end; gap:6px;
    background: var(--surface); border:1px solid var(--border);
    border-radius: 18px; padding:8px 8px 8px 10px;
  }
  .composer-inner.drag-over{ border-color: var(--accent); background: var(--accent-soft); }
  .attach-btn, .mic-btn{
    width:34px; height:34px; border-radius:50%; border:none; background:none;
    color:var(--text-muted); cursor:pointer; font-size:17px; flex-shrink:0;
  }
  .attach-btn:hover, .mic-btn:hover{ background:var(--surface-2); }
  .mic-btn.recording{ background: var(--danger); color:#fff; animation: pulse 1.2s infinite; }
  @keyframes pulse{ 0%,100%{ opacity:1;} 50%{ opacity:.6;} }
  .composer-inner textarea{
    flex:1; border:none; background:none; resize:none; outline:none;
    color: var(--text); font-family:inherit; font-size:14.5px; line-height:1.5;
    max-height:160px; padding:8px 0;
  }
  .composer-inner textarea::placeholder{ color: var(--text-muted); }
  .send-btn{
    width:36px; height:36px; border-radius:50%; border:none;
    background: var(--accent); color:#fff; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .send-btn.stop{ background: var(--danger); }
  .send-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .hint{ text-align:center; font-size:11px; color: var(--text-muted); margin-top:8px; }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background:var(--surface); border-radius:16px; padding:20px; max-width:480px; width:100%;
    border:1px solid var(--border);
  }
  .modal h2{ margin:0 0 6px; font-size:16px; }
  .modal p.desc{ margin:0 0 12px; font-size:12.5px; color:var(--text-muted); }
  .modal textarea{
    width:100%; min-height:120px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-family:inherit; font-size:13.5px;
    padding:10px; resize:vertical;
  }
  .modal-actions{ display:flex; gap:8px; margin-top:12px; justify-content:flex-end; }
  .modal-actions button{
    border:none; border-radius:9px; padding:8px 14px; font-size:13px; cursor:pointer; font-weight:600;
  }
  .modal-actions .save-btn{ background:var(--accent); color:#fff; }
  .modal-actions .cancel-btn{ background:var(--surface-2); color:var(--text-muted); }

  .sidebar-backdrop{ display:none; }
  .lightbox-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:200;
    display:none; align-items:center; justify-content:center; padding:20px; cursor:zoom-out;
  }
  .lightbox-overlay.show{ display:flex; }
  .lightbox-overlay img{ max-width:90vw; max-height:90vh; border-radius:8px; }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background: var(--border); border-radius:8px; }

  @media (max-width: 768px){
    .sidebar{
      position: fixed; top:0; left:0; height:100vh; height:100dvh; z-index:50;
      box-shadow: 0 0 24px rgba(0,0,0,.2);
    }
    .sidebar-backdrop{
      display:block; position:fixed; inset:0; background:rgba(0,0,0,.4);
      z-index:40; opacity:0; pointer-events:none; transition:opacity .2s ease;
    }
    .sidebar-backdrop.show{ opacity:1; pointer-events:auto; }
    .msg-row{ padding: 0 12px; gap:8px; }
    .bubble-col{ max-width: 78vw; }
    .avatar{ width:26px; height:26px; font-size:12px; }
    .composer{ padding:10px 12px 14px; }
    .topbar{ padding:10px 14px; }
    .suggestions{ max-width: 90vw; }
  }
</style>
</head>
<body data-theme="light">
<div class="app">

  <div class="sidebar" id="sidebar">
    <div class="brand"><img src="logo.png" alt="Matrix logo" class="brand-mark">Matrix</div>
    <button class="new-chat" id="newChatBtn">＋ New chat</button>
    <button class="instructions-btn" id="clearAllBtn" style="margin:0 16px 8px;">🗑 Clear all chats</button>
    <button class="instructions-btn" id="selectModeBtn" style="margin:0 16px 8px;">☑ Select chats</button>
    <div id="bulkActions" style="display:none; margin:0 16px 8px;">
      <button class="instructions-btn" id="bulkDeleteBtn" style="width:100%; color:var(--danger); border-color:var(--danger);">Delete selected (<span id="bulkCount">0</span>)</button>
    </div>
    <div class="search-box"><input type="text" id="searchConvs" placeholder="Search chats..."></div>
    <div class="conv-list" id="convList"></div>
    <div class="sidebar-footer">
      <label>Model</label>
      <select id="modelSelect">
        <option value="gpt-5.5">Matrix Turbo</option>
        <option value="gpt-5.4">Matrix Pro</option>
        <option value="gpt-5.4-mini">Matrix Fast</option>
        <option value="claude-sonnet-4-6">Matrix Reasoning</option>
        <option value="claude-fable-5">Matrix Vision</option>
      </select>
      <label>Persona</label>
      <select id="personaSelect">
        <option value="">Default</option>
        <option value="coding">Coding helper</option>
        <option value="writer">Creative writer</option>
        <option value="concise">Concise assistant</option>
        <option value="tutor">Patient tutor</option>
      </select>
      <label>Text size</label>
      <select id="fontSizeSelect">
        <option value="13px">Small</option>
        <option value="14.5px" selected>Medium</option>
        <option value="16.5px">Large</option>
      </select>
      <label>Spacing</label>
      <select id="densitySelect">
        <option value="comfortable" selected>Comfortable</option>
        <option value="compact">Compact</option>
      </select>
      <button class="instructions-btn" id="instructionsBtn">⚙ Custom instructions</button>
      <button class="instructions-btn" id="importBtn">⬆ Import chat</button>
      <input type="file" id="importFileInput" accept=".md" style="display:none">
      <button class="theme-toggle" id="themeToggle">🌙 Dark mode</button>
      <button class="theme-toggle" id="soundToggle">🔔 Sound: On</button>
      <div class="made-by">Made by ABM Mahiuzzaman Muqshit</div>
    </div>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <div class="main">
    <div class="topbar">
      <button class="icon-btn" id="sidebarToggle">☰</button>
      <div class="chat-title" id="chatTitle">New chat</div>
      <button class="export-btn" id="copyConvBtn">📋 Copy</button>
      <button class="export-btn" id="exportBtn">⬇ Export PDF</button>
    </div>

    <div class="messages" id="messages"></div>
    <button class="scroll-bottom-btn" id="scrollBottomBtn" title="Scroll to bottom">↓</button>

    <div class="composer">
      <div class="pending-attachments" id="pendingAttachments"></div>
      <div class="composer-inner" id="composerInner">
        <button class="attach-btn" id="attachBtn" title="Attach file/image">📎</button>
        <input type="file" id="fileInput" multiple style="display:none" accept="image/*,.txt,.md,.csv,.json,.js,.py,.html,.css">
        <button class="mic-btn" id="micBtn" title="Voice input">🎤</button>
        <textarea id="input" placeholder="Message Matrix..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn">↑</button>
      </div>
      <div class="char-counter" id="charCounter"></div>
      <div class="hint">Your API key and chats are stored only in this browser.</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="instructionsModal">
  <div class="modal">
    <h2>Custom instructions</h2>
    <p class="desc">Tell Matrix how to behave — tone, format, things to always do or avoid. Applies to every chat.</p>
    <textarea id="instructionsText" placeholder="e.g. Keep answers short. Always use bullet points. Be direct and skip pleasantries."></textarea>
    <div class="modal-actions">
      <button class="cancel-btn" id="instructionsCancel">Cancel</button>
      <button class="save-btn" id="instructionsSave">Save</button>
    </div>
  </div>
</div>

<div class="lightbox-overlay" id="lightboxOverlay">
  <img id="lightboxImg" src="" alt="Full size image">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script>
const API_BASE = "/.netlify/functions/chat";
const STORAGE_KEY = "matrix_conversations_v1";
const INSTRUCTIONS_KEY = "matrix_custom_instructions_v1";

let conversations = [];
let activeId = null;
let pendingFiles = [];
let currentAbortController = null;
let isStreaming = false;
let searchTerm = "";
let selectMode = false;
let selectedIds = new Set();

let matrixGridHandle = null;
function startMatrixGrid(){
  const canvas = document.getElementById("matrixGrid");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function resize(){
    canvas.width = canvas.offsetWidth * devicePixelRatio;
    canvas.height = canvas.offsetHeight * devicePixelRatio;
  }
  resize();

  const spacing = 34 * devicePixelRatio;
  const dotR = 1.6 * devicePixelRatio;
  const cells = [];
  const cols = Math.ceil(canvas.width / spacing) + 1;
  const rows = Math.ceil(canvas.height / spacing) + 1;
  for (let r = 0; r < rows; r++){
    for (let c = 0; c < cols; c++){
      cells.push({ x: c * spacing, y: r * spacing, pulse: 0 });
    }
  }

  const isDark = document.body.getAttribute("data-theme") === "dark";
  const baseColor = isDark ? "148,148,159" : "180,178,170";
  const accentColor = "106,77,255";
  const accent2Color = "255,180,84";

  function draw(){
    if (!document.getElementById("matrixGrid")) { cancelAnimationFrame(matrixGridHandle); return; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    cells.forEach(cell => {
      if (!reduceMotion && Math.random() < 0.0015) cell.pulse = 1;
      if (cell.pulse > 0) cell.pulse -= 0.015;
      const t = Math.max(0, cell.pulse);
      const r = dotR + t * dotR * 2.5;
      const color = t > 0.5 ? accentColor : accent2Color;
      ctx.beginPath();
      ctx.arc(cell.x, cell.y, r, 0, Math.PI * 2);
      ctx.fillStyle = t > 0 ? `rgba(${color},${0.15 + t * 0.5})` : `rgba(${baseColor},0.35)`;
      ctx.fill();
    });
    if (!reduceMotion) matrixGridHandle = requestAnimationFrame(draw);
  }
  draw();
}

function uid(){ return Math.random().toString(36).slice(2,10); }
function formatTime(ts){
  if (!ts) return "";
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}

let currentUtterance = null;
function toggleSpeak(text, btn){
  if (!window.speechSynthesis) return;
  if (currentUtterance && speechSynthesis.speaking) {
    speechSynthesis.cancel();
    currentUtterance = null;
    document.querySelectorAll(".speak-btn.speaking").forEach(b => b.classList.remove("speaking"));
    return;
  }
  const utter = new SpeechSynthesisUtterance(text);
  currentUtterance = utter;
  btn.classList.add("speaking");
  utter.onend = () => { btn.classList.remove("speaking"); currentUtterance = null; };
  speechSynthesis.speak(utter);
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ---------- Persistence ----------
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({ conversations, activeId })); }
  catch(e){ console.warn("Could not save chat history:", e); }
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      const parsed = JSON.parse(raw);
      conversations = parsed.conversations || [];
      activeId = parsed.activeId || (conversations[0] ? conversations[0].id : null);
    }
  }catch(e){ console.warn("Could not load chat history:", e); }
}
function saveInstructions(){
  try{ localStorage.setItem(INSTRUCTIONS_KEY, customInstructions); }catch(e){}
}
function loadInstructions(){
  try{ customInstructions = localStorage.getItem(INSTRUCTIONS_KEY) || ""; }catch(e){ customInstructions = ""; }
}

// ---------- Conversation management ----------
function newConversation(){
  const conv = { id: uid(), title: "New chat", messages: [] };
  conversations.unshift(conv);
  activeId = conv.id;
  saveState();
  renderSidebar();
  renderMessages();
  if (isMobile()) closeSidebar();
}
function getActive(){ return conversations.find(c => c.id === activeId); }

function convMatchesSearch(c, term){
  if (!term) return true;
  const t = term.toLowerCase();
  if (c.title.toLowerCase().includes(t)) return true;
  return c.messages.some(m => (m.content || "").toLowerCase().includes(t));
}

function renderSidebar(){
  const list = document.getElementById("convList");
  list.innerHTML = "";
  const filtered = conversations
    .filter(c => convMatchesSearch(c, searchTerm))
    .sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

  if (filtered.length === 0){
    list.innerHTML = `<div class="empty-search">No chats found</div>`;
    return;
  }

  filtered.forEach(c => {
    const item = document.createElement("div");
    item.className = "conv-item" + (c.id === activeId ? " active" : "");
    const checkbox = selectMode ? `<input type="checkbox" class="bulk-check" ${selectedIds.has(c.id) ? "checked" : ""}>` : "";
    item.innerHTML = `
      ${checkbox}
      <span class="title">${c.pinned ? "📌 " : ""}${escapeHtml(c.title)}</span>
      <div class="row-actions">
        <button class="pin-btn${c.pinned ? " pinned" : ""}" title="Pin">📌</button>
        <button class="dup-btn" title="Duplicate">⧉</button>
        <button class="rename-btn" title="Rename">✎</button>
        <button class="del" title="Delete">✕</button>
      </div>`;
    if (selectMode) {
      item.querySelector(".bulk-check").onclick = (e) => {
        e.stopPropagation();
        if (e.target.checked) selectedIds.add(c.id); else selectedIds.delete(c.id);
        updateBulkBar();
      };
      item.querySelector(".title").onclick = () => item.querySelector(".bulk-check").click();
    } else {
      item.querySelector(".title").onclick = () => { activeId = c.id; saveState(); renderSidebar(); renderMessages(); if (isMobile()) closeSidebar(); };
    }

    item.querySelector(".pin-btn").onclick = (e) => {
      e.stopPropagation();
      c.pinned = !c.pinned;
      saveState();
      renderSidebar();
    };

    item.querySelector(".dup-btn").onclick = (e) => {
      e.stopPropagation();
      const copy = JSON.parse(JSON.stringify(c));
      copy.id = uid();
      copy.title = c.title + " (copy)";
      copy.pinned = false;
      const originalIdx = conversations.indexOf(c);
      conversations.splice(originalIdx + 1, 0, copy);
      activeId = copy.id;
      saveState();
      renderSidebar();
      renderMessages();
    };

    item.querySelector(".rename-btn").onclick = (e) => {
      e.stopPropagation();
      const span = item.querySelector(".title");
      const input = document.createElement("input");
      input.className = "rename-input";
      input.value = c.title;
      item.replaceChild(input, span);
      input.focus();
      input.select();
      const commit = () => { c.title = input.value.trim() || c.title; saveState(); renderSidebar(); renderMessages(); };
      input.onblur = commit;
      input.onkeydown = (ev) => {
        if (ev.key === "Enter") { ev.preventDefault(); commit(); }
        if (ev.key === "Escape") { renderSidebar(); }
      };
    };

    item.querySelector(".del").onclick = (e) => {
      e.stopPropagation();
      conversations = conversations.filter(x => x.id !== c.id);
      if (activeId === c.id) {
        activeId = conversations[0] ? conversations[0].id : null;
        if (!activeId) { newConversation(); return; }
      }
      saveState();
      renderSidebar(); renderMessages();
    };
    list.appendChild(item);
  });
}

// ---------- Markdown rendering ----------
function inlineFmt(escapedText){
  let t = escapedText;
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
  return t;
}
function renderTableBlock(lines){
  const splitRow = (l) => l.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
  const header = splitRow(lines[0]);
  const rows = lines.slice(2).map(splitRow);
  let html = '<table class="md-table"><thead><tr>';
  header.forEach(h => html += `<th>${inlineFmt(escapeHtml(h))}</th>`);
  html += '</tr></thead><tbody>';
  rows.forEach(r => {
    html += '<tr>';
    r.forEach(c => html += `<td>${inlineFmt(escapeHtml(c))}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}
function renderMarkdown(text){
  if (!text) return "";
  const codeBlocks = [];
  const working = text.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
    codeBlocks.push(code);
    return "\u0000CODEBLOCK" + (codeBlocks.length - 1) + "\u0000";
  });

  const blocks = working.split(/\n{2,}/);
  const htmlBlocks = blocks.map(block => {
    if (block.indexOf("\u0000CODEBLOCK") === 0) return block;
    const lines = block.split("\n");

    if (lines.length >= 2 && /^\s*\|.*\|\s*$/.test(lines[0]) && /^\s*\|?[\s:-]+\|[\s:|-]*\s*$/.test(lines[1])) {
      return renderTableBlock(lines);
    }
    const headingMatch = lines.length === 1 ? lines[0].match(/^(#{1,3})\s+(.*)/) : null;
    if (headingMatch) {
      const level = headingMatch[1].length;
      return `<div class="md-h${level}">${inlineFmt(escapeHtml(headingMatch[2]))}</div>`;
    }
    if (lines.every(l => /^\s*[-*]\s+/.test(l) && l.trim().length > 0)) {
      const items = lines.map(l => `<li>${inlineFmt(escapeHtml(l.replace(/^\s*[-*]\s+/, '')))}</li>`).join('');
      return `<ul class="md-list">${items}</ul>`;
    }
    if (lines.every(l => /^\s*\d+\.\s+/.test(l) && l.trim().length > 0)) {
      const items = lines.map(l => `<li>${inlineFmt(escapeHtml(l.replace(/^\s*\d+\.\s+/, '')))}</li>`).join('');
      return `<ol class="md-list">${items}</ol>`;
    }
    return `<p class="md-p">${lines.map(l => inlineFmt(escapeHtml(l))).join('<br>')}</p>`;
  });

  let html = htmlBlocks.join('');
  html = html.replace(/\u0000CODEBLOCK(\d+)\u0000/g, (m, i) =>
    `<div class="code-wrap"><pre><code>${escapeHtml(codeBlocks[i])}</code></pre><button class="code-copy-btn">Copy</button></div>`
  );
  return html;
}
function attachCodeCopyHandlers(container){
  container.querySelectorAll(".code-wrap").forEach(wrap => {
    const btn = wrap.querySelector(".code-copy-btn");
    const code = wrap.querySelector("code");
    btn.onclick = () => {
      navigator.clipboard.writeText(code.textContent);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1200);
    };
  });
}
function renderMathIn(container){
  if (window.renderMathInElement) {
    try {
      window.renderMathInElement(container, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "$", right: "$", display: false }
        ],
        throwOnError: false
      });
    } catch(e){ /* ignore */ }
  }
}

function renderAttachmentsPreview(atts){
  if (!atts || atts.length === 0) return "";
  let html = '<div class="attachments">';
  atts.forEach(a => {
    if (a.isImage) html += `<img src="${a.dataUrl}" alt="${escapeHtml(a.name)}">`;
    else html += `<div class="attachment-chip">📄 ${escapeHtml(a.name)}</div>`;
  });
  html += "</div>";
  return html;
}

function renderMessages(){
  const conv = getActive();
  const box = document.getElementById("messages");
  document.getElementById("chatTitle").textContent = conv ? conv.title : "New chat";
  box.innerHTML = "";

  if (!conv || conv.messages.length === 0) {
    box.innerHTML = `
      <div class="empty-state">
        <canvas id="matrixGrid"></canvas>
        <div class="empty-content">
          <h1>What can I help with?</h1>
          <div class="suggestions">
            <div class="suggestion">Explain how black holes form</div>
            <div class="suggestion">Write a Python function to sort a list</div>
            <div class="suggestion">Give me dinner ideas for tonight</div>
            <div class="suggestion">Help me draft a polite email</div>
          </div>
        </div>
      </div>`;
    box.querySelectorAll(".suggestion").forEach(s => {
      s.onclick = () => { document.getElementById("input").value = s.textContent; sendMessage(); };
    });
    startMatrixGrid();
    return;
  }

  conv.messages.forEach((m, idx) => {
    const row = document.createElement("div");
    row.className = "msg-row " + m.role;
    const isLastAssistant = m.role === "assistant" && idx === conv.messages.length - 1;

    row.innerHTML = `
      <div class="avatar ${m.role}">${m.role === "user" ? "U" : "M"}</div>
      <div class="bubble-col" data-idx="${idx}">
        <div class="msg-content">
          ${renderAttachmentsPreview(m.attachments)}
          <div class="bubble">${renderMarkdown(m.content)}</div>
        </div>
        <div class="msg-actions">
          <span class="msg-time">${formatTime(m.ts)}</span>
          ${m.role === "assistant" ? `<button class="copy-btn">Copy</button><button class="speak-btn">🔊</button>` : ""}
          ${m.role === "user" ? `<button class="edit-btn">Edit</button>` : ""}
          ${isLastAssistant ? `<button class="regen-btn">↻ Regenerate</button>` : ""}
        </div>
      </div>
    `;
    if (m.role === "assistant") {
      row.querySelector(".copy-btn").onclick = () => navigator.clipboard.writeText(m.content);
      row.querySelector(".speak-btn").onclick = (e) => toggleSpeak(m.content, e.currentTarget);
    }
    if (m.role === "user") row.querySelector(".edit-btn").onclick = () => startEdit(idx);
    if (isLastAssistant) row.querySelector(".regen-btn").onclick = () => regenerateLast();
    box.appendChild(row);
  });
  attachCodeCopyHandlers(box);
  renderMathIn(box);
  box.querySelectorAll(".attachments img").forEach(img => {
    img.onclick = () => {
      document.getElementById("lightboxImg").src = img.src;
      document.getElementById("lightboxOverlay").classList.add("show");
    };
  });
  if (autoScroll) box.scrollTop = box.scrollHeight;
  updateScrollButton();
}

  document.getElementById("lightboxOverlay").classList.remove("show");
};

function startEdit(idx){
  const conv = getActive();
  const m = conv.messages[idx];
  const box = document.getElementById("messages");
  const col = box.querySelector(`.bubble-col[data-idx="${idx}"]`);
  const content = col.querySelector(".msg-content");
  content.innerHTML = `
    <div class="edit-box">
      <textarea>${escapeHtml(m.content)}</textarea>
      <div class="edit-actions">
        <button class="cancel-btn">Cancel</button>
        <button class="save-btn">Save & submit</button>
      </div>
    </div>`;
  const textarea = content.querySelector("textarea");
  textarea.focus();
  content.querySelector(".cancel-btn").onclick = () => renderMessages();
  content.querySelector(".save-btn").onclick = () => {
    const newText = textarea.value.trim();
    if (!newText) return;
    conv.messages = conv.messages.slice(0, idx);
    conv.messages.push({ role: "user", content: newText, attachments: m.attachments || [], ts: Date.now() });
    saveState();
    renderMessages();
    runCompletion();
  };
}

function regenerateLast(){
  const conv = getActive();
  if (!conv || conv.messages.length === 0) return;
  const last = conv.messages[conv.messages.length - 1];
  if (last.role === "assistant") conv.messages.pop();
  saveState();
  renderMessages();
  runCompletion();
}

// ---------- File attachments ----------
function readFileAsAttachment(file){
  return new Promise((resolve) => {
    const isImage = file.type.startsWith("image/");
    const reader = new FileReader();
    reader.onload = () => {
      if (isImage) resolve({ name: file.name, mime: file.type, dataUrl: reader.result, isImage: true });
      else resolve({ name: file.name, mime: file.type || "text/plain", dataUrl: null, isImage: false, textContent: reader.result });
    };
    if (isImage) reader.readAsDataURL(file);
    else reader.readAsText(file);
  });
}
function renderPendingAttachments(){
  const wrap = document.getElementById("pendingAttachments");
  wrap.innerHTML = "";
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement("div");
    chip.className = "pending-attachment";
    chip.innerHTML = f.isImage
      ? `<img src="${f.dataUrl}"><span>${escapeHtml(f.name)}</span><button>✕</button>`
      : `<span>📄 ${escapeHtml(f.name)}</span><button>✕</button>`;
    chip.querySelector("button").onclick = () => { pendingFiles.splice(i, 1); renderPendingAttachments(); };
    wrap.appendChild(chip);
  });
}
async function handleIncomingFiles(fileList){
  const files = Array.from(fileList);
  for (const f of files) {
    const att = await readFileAsAttachment(f);
    pendingFiles.push(att);
  }
  renderPendingAttachments();
}
document.getElementById("attachBtn").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = async (e) => {
  await handleIncomingFiles(e.target.files);
  e.target.value = "";
};

// ---------- Voice input ----------
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognitionAPI) {
  recognizer = new SpeechRecognitionAPI();
  recognizer.continuous = false;
  recognizer.interimResults = false;
  recognizer.lang = "en-US";
  recognizer.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join(" ");
    const input = document.getElementById("input");
    input.value = (input.value ? input.value + " " : "") + transcript;
    input.dispatchEvent(new Event("input"));
  };
  recognizer.onend = () => { isRecording = false; document.getElementById("micBtn").classList.remove("recording"); };
  recognizer.onerror = () => { isRecording = false; document.getElementById("micBtn").classList.remove("recording"); };
} else {
  document.getElementById("micBtn").style.display = "none";
}
document.getElementById("micBtn").onclick = () => {
  if (!recognizer) return;
  if (isRecording) { recognizer.stop(); return; }
  isRecording = true;
  document.getElementById("micBtn").classList.add("recording");
  recognizer.start();
};

function loadImageAsDataURL(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      resolve(canvas.toDataURL("image/png"));
    };
    img.onerror = reject;
    img.src = src;
  });
}

document.getElementById("exportBtn").onclick = async () => {
  const conv = getActive();
  if (!conv || conv.messages.length === 0) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "a4" });
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const margin = 44;
  const maxWidth = pageWidth - margin * 2;
  let y = margin;

  function addFooter(){
    const pageNum = doc.internal.getCurrentPageInfo().pageNumber;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text("Made by ABM Mahiuzzaman Muqshit — Matrix AI", pageWidth / 2, pageHeight - 24, { align: "center" });
    doc.text(String(pageNum), pageWidth - margin, pageHeight - 24, { align: "right" });
  }
  function ensureSpace(neededHeight){
    if (y + neededHeight > pageHeight - 55) {
      addFooter();
      doc.addPage();
      y = margin;
    }
  }

  try {
    const logoDataUrl = await loadImageAsDataURL("logo.png");
    doc.addImage(logoDataUrl, "PNG", margin, y, 28, 28);
  } catch (e) { /* logo not available, continue without it */ }

  doc.setFont("helvetica", "bold");
  doc.setFontSize(17);
  doc.setTextColor(20);
  doc.text("Matrix", margin + 36, y + 19);

  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.setTextColor(130);
  doc.text(new Date().toLocaleString(), pageWidth - margin, y + 19, { align: "right" });
  y += 46;

  doc.setFont("helvetica", "bold");
  doc.setFontSize(13);
  doc.setTextColor(20);
  doc.text(conv.title, margin, y);
  y += 10;
  doc.setDrawColor(225);
  doc.line(margin, y, pageWidth - margin, y);
  y += 22;

  conv.messages.forEach(m => {
    const label = m.role === "user" ? "You" : "Matrix";
    const timeStr = m.ts ? "   " + formatTime(m.ts) : "";

    ensureSpace(20);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10.5);
    doc.setTextColor(m.role === "user" ? 79 : 20, m.role === "user" ? 95 : 20, m.role === "user" ? 255 : 20);
    doc.text(label, margin, y);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8.5);
    doc.setTextColor(150);
    doc.text(timeStr, margin + doc.getTextWidth(label), y);
    y += 15;

    doc.setFont("helvetica", "normal");
    doc.setFontSize(10.5);
    doc.setTextColor(35);
    const lines = doc.splitTextToSize(m.content || "", maxWidth);
    lines.forEach(line => {
      ensureSpace(14);
      doc.text(line, margin, y);
      y += 14;
    });
    y += 12;
  });

  addFooter();
  doc.save(conv.title.replace(/[^a-z0-9]/gi, "_").slice(0, 40) + ".pdf");
};

// ---------- Sending ----------
function buildApiMessages(conv){
  let identityText = "You are Matrix, a helpful AI assistant. Always refer to yourself as Matrix. Never reveal, mention, or confirm the name of the underlying model or company that powers you (for example, do not say GPT, OpenAI, Claude, Anthropic, or Gemini), even if the user asks directly or insists. If asked what model or AI you are, simply say you are Matrix.";
  if (customInstructions) identityText += "\n\nAdditional instructions from the user about how to behave: " + customInstructions;
  const identity = { role: "system", content: identityText };

  const history = conv.messages.map(m => {
    const imageAtts = (m.attachments || []).filter(a => a.isImage);
    const textAtts = (m.attachments || []).filter(a => !a.isImage);
    let textContent = m.content;
    textAtts.forEach(a => { textContent += `\n\n[Attached file: ${a.name}]\n${a.textContent}`; });
    if (imageAtts.length > 0) {
      const parts = [{ type: "text", text: textContent }];
      imageAtts.forEach(a => parts.push({ type: "image_url", image_url: { url: a.dataUrl } }));
      return { role: m.role, content: parts };
    }
    return { role: m.role, content: textContent };
  });
  return [identity, ...history];
}

async function sendMessage(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text && pendingFiles.length === 0) return;

  let conv = getActive();
  if (!conv) { newConversation(); conv = getActive(); }
  if (conv.messages.length === 0) conv.title = (text || "New attachment").slice(0, 32);

  conv.messages.push({ role: "user", content: text, attachments: pendingFiles.slice(), ts: Date.now() });
  pendingFiles = [];
  renderPendingAttachments();
  input.value = "";
  input.style.height = "auto";
  document.getElementById("charCounter").textContent = "";
  autoScroll = true;
  saveState();
  renderSidebar();
  renderMessages();
  runCompletion();
}

async function runCompletion(){
  const conv = getActive();
  const model = document.getElementById("modelSelect").value;
  showTyping();
  setStreamingUI(true);

  currentAbortController = new AbortController();

  try {
    const res = await fetch(API_BASE, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: model, messages: buildApiMessages(conv), stream: true }),
      signal: currentAbortController.signal
    });

    if (!res.ok || !res.body) {
      const errText = await res.text().catch(() => "");
      throw new Error("Request failed (" + res.status + "). " + errText.slice(0, 200));
    }

    removeTyping();
    conv.messages.push({ role: "assistant", content: "", ts: Date.now() });
    renderMessages();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith("data:")) continue;
        const data = trimmed.slice(5).trim();
        if (data === "[DONE]") continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            conv.messages[conv.messages.length - 1].content += delta;
            renderMessages();
          }
        } catch (e) { /* ignore partial chunk */ }
      }
    }
    saveState();
    playDoneSound();
  } catch (err) {
    removeTyping();
    if (err.name === "AbortError") {
      if (conv.messages[conv.messages.length - 1]?.role !== "assistant") {
        conv.messages.push({ role: "assistant", content: "_Stopped._" });
      }
    } else {
      conv.messages.push({ role: "assistant", content: "⚠️ " + err.message });
    }
    saveState();
    renderMessages();
  } finally {
    setStreamingUI(false);
    currentAbortController = null;
  }
}

document.getElementById("sendBtn").onclick = () => {
  if (isStreaming) { if (currentAbortController) currentAbortController.abort(); }
  else sendMessage();
};
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!isStreaming) sendMessage(); }
});
document.getElementById("input").addEventListener("input", function(){
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 160) + "px";
  const len = this.value.length;
  const words = this.value.trim() ? this.value.trim().split(/\s+/).length : 0;
  document.getElementById("charCounter").textContent = len > 0 ? `${words} words · ${len} chars` : "";
});

const PERSONA_KEY = "matrix_persona_v1";
const PERSONAS = {
  coding: "Act as an expert software engineer. Give precise, working code with brief explanations. Prefer showing code over long prose. Point out edge cases and bugs proactively.",
  writer: "Act as a creative writing collaborator. Be imaginative, use vivid language, and offer stylistic suggestions. Ask about tone and audience when it's unclear.",
  concise: "Be as brief as possible. Answer in short sentences or bullet points. Skip pleasantries and caveats unless essential.",
  tutor: "Act as a patient tutor. Explain concepts step by step, check understanding, and use simple analogies. Never just give the final answer to a learning question without explaining the reasoning."
};
document.getElementById("personaSelect").addEventListener("change", function(){
  customInstructions = PERSONAS[this.value] || "";
  saveInstructions();
  localStorage.setItem(PERSONA_KEY, this.value);
});

const SOUND_KEY = "matrix_sound_v1";
let soundEnabled = localStorage.getItem(SOUND_KEY) !== "off";
function updateSoundBtn(){
  document.getElementById("soundToggle").textContent = soundEnabled ? "🔔 Sound: On" : "🔕 Sound: Off";
}
document.getElementById("soundToggle").onclick = () => {
  soundEnabled = !soundEnabled;
  localStorage.setItem(SOUND_KEY, soundEnabled ? "on" : "off");
  updateSoundBtn();
};
function playDoneSound(){
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 720;
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    osc.start(); osc.stop(ctx.currentTime + 0.25);
  } catch(e){ /* ignore */ }
}
const DENSITY_KEY = "matrix_density_v1";
function applyDensity(mode){
  const root = document.documentElement.style;
  if (mode === "compact") { root.setProperty("--msg-gap", "10px"); root.setProperty("--msg-padding", "7px 12px"); }
  else { root.setProperty("--msg-gap", "20px"); root.setProperty("--msg-padding", "11px 15px"); }
}
document.getElementById("densitySelect").addEventListener("change", function(){
  applyDensity(this.value);
  localStorage.setItem(DENSITY_KEY, this.value);
});

const FONT_KEY = "matrix_font_size_v1";

document.getElementById("fontSizeSelect").addEventListener("change", function(){
  document.documentElement.style.setProperty("--msg-font-size", this.value);
  localStorage.setItem(FONT_KEY, this.value);
});

document.getElementById("importBtn").onclick = () => document.getElementById("importFileInput").click();
document.getElementById("importFileInput").onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const text = reader.result;
    const titleMatch = text.match(/^#\s+(.*)/);
    const title = titleMatch ? titleMatch[1].trim() : "Imported chat";
    const parts = text.split(/\*\*(You|Matrix):\*\*\n/).slice(1);
    const messages = [];
    for (let i = 0; i < parts.length; i += 2) {
      const role = parts[i] === "You" ? "user" : "assistant";
      const content = (parts[i + 1] || "").trim();
      if (content) messages.push({ role, content, ts: Date.now() });
    }
    const conv = { id: uid(), title, messages };
    conversations.unshift(conv);
    activeId = conv.id;
    saveState();
    renderSidebar();
    renderMessages();
  };
  reader.readAsText(file);
  e.target.value = "";
};

document.addEventListener("keydown", (e) => {
  const tag = (document.activeElement && document.activeElement.tagName) || "";
  const typing = tag === "TEXTAREA" || tag === "INPUT";

  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
    e.preventDefault();
    newConversation();
    return;
  }
  if (e.key === "/" && !typing) {
    e.preventDefault();
    if (isMobile()) openSidebar();
    document.getElementById("searchConvs").focus();
    return;
  }
  if (e.key === "Escape") {
    document.getElementById("lightboxOverlay").classList.remove("show");
    document.getElementById("instructionsModal").classList.remove("show");
    if (isMobile()) closeSidebar();
  }
});

document.getElementById("searchConvs").addEventListener("input", function(){
  searchTerm = this.value;
  renderSidebar();
});

document.getElementById("newChatBtn").onclick = newConversation;
document.getElementById("clearAllBtn").onclick = () => {
  if (!confirm("Delete all conversations? This can't be undone.")) return;
  conversations = [];
  newConversation();
};

function updateBulkBar(){
  document.getElementById("bulkCount").textContent = selectedIds.size;
  document.getElementById("bulkActions").style.display = selectMode && selectedIds.size > 0 ? "block" : "none";
}
document.getElementById("selectModeBtn").onclick = () => {
  selectMode = !selectMode;
  selectedIds = new Set();
  document.getElementById("selectModeBtn").textContent = selectMode ? "✕ Cancel select" : "☑ Select chats";
  updateBulkBar();
  renderSidebar();
};
document.getElementById("bulkDeleteBtn").onclick = () => {
  if (!confirm(`Delete ${selectedIds.size} selected chat(s)?`)) return;
  conversations = conversations.filter(c => !selectedIds.has(c.id));
  if (!getActive()) { activeId = conversations[0] ? conversations[0].id : null; }
  selectMode = false;
  selectedIds = new Set();
  document.getElementById("selectModeBtn").textContent = "☑ Select chats";
  updateBulkBar();
  saveState();
  if (conversations.length === 0) newConversation();
  else { renderSidebar(); renderMessages(); }
};

function isMobile(){ return window.innerWidth <= 768; }
function openSidebar(){
  document.getElementById("sidebar").classList.remove("collapsed");
  if (isMobile()) document.getElementById("sidebarBackdrop").classList.add("show");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.add("collapsed");
  document.getElementById("sidebarBackdrop").classList.remove("show");
}
document.getElementById("sidebarToggle").onclick = () => {
  const sidebar = document.getElementById("sidebar");
  if (sidebar.classList.contains("collapsed")) openSidebar();
  else closeSidebar();
};
document.getElementById("sidebarBackdrop").onclick = closeSidebar;

const THEME_KEY = "matrix_theme_pref_v1";
function applyTheme(theme){
  document.body.setAttribute("data-theme", theme);
  document.getElementById("themeToggle").textContent = theme === "dark" ? "☀️ Light mode" : "🌙 Dark mode";
}
function initTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) { applyTheme(saved); return; }
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(prefersDark ? "dark" : "light");
}
if (window.matchMedia) {
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (e) => {
    if (!localStorage.getItem(THEME_KEY)) applyTheme(e.matches ? "dark" : "light");
  });
}
document.getElementById("themeToggle").onclick = () => {
  const dark = document.body.getAttribute("data-theme") === "dark";
  const next = dark ? "light" : "dark";
  applyTheme(next);
  localStorage.setItem(THEME_KEY, next);
};

// ---------- Init ----------
loadState();
loadInstructions();
initTheme();
updateSoundBtn();
const savedPersona = localStorage.getItem(PERSONA_KEY);
if (savedPersona) document.getElementById("personaSelect").value = savedPersona;
const savedDensity = localStorage.getItem(DENSITY_KEY);
if (savedDensity) { applyDensity(savedDensity); document.getElementById("densitySelect").value = savedDensity; }
const savedFont = localStorage.getItem(FONT_KEY);
if (savedFont) {
  document.documentElement.style.setProperty("--msg-font-size", savedFont);
  document.getElementById("fontSizeSelect").value = savedFont;
}
if (conversations.length === 0) newConversation();
else { renderSidebar(); renderMessages(); }
if (isMobile()) closeSidebar();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}
</script>
