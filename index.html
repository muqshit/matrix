<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix-Your AI</title>
<link rel="icon" type="image/png" href="logo1.png">
<style>
  :root{
    --bg: #F6F7FA;
    --surface: #FFFFFF;
    --surface-2: #EEF0F5;
    --border: #E2E5EC;
    --text: #191B23;
    --text-muted: #6B7080;
    --accent: #4F5FFF;
    --accent-hover: #3F4EEF;
    --accent-soft: #EDEFFF;
    --user-bubble: #4F5FFF;
    --user-text: #FFFFFF;
    --assistant-bubble: #FFFFFF;
    --danger: #E5484D;
    --radius: 14px;
    --sidebar-w: 280px;
  }
  [data-theme="dark"]{
    --bg: #16171D;
    --surface: #1E1F27;
    --surface-2: #262832;
    --border: #333542;
    --text: #ECEDF2;
    --text-muted: #8A8D9A;
    --accent: #7C8CFF;
    --accent-hover: #8E9CFF;
    --accent-soft: #262A45;
    --user-bubble: #7C8CFF;
    --user-text: #12131A;
    --assistant-bubble: #23252E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }
  .app{ display:flex; height:100vh; height:100dvh; }

  .sidebar{
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display:flex;
    flex-direction:column;
    flex-shrink:0;
    transition: margin-left .2s ease;
  }
  .sidebar.collapsed{ margin-left: calc(-1 * var(--sidebar-w)); }

  .sidebar-backdrop{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:15;
  }
  .sidebar-backdrop.show{ display:block; }

  @media (max-width: 768px){
    .sidebar{
      position:fixed; top:0; left:0; height:100vh; z-index:20;
      box-shadow: 0 0 24px rgba(0,0,0,.2);
    }
    .msg-row{ padding:0 12px; }
    .bubble-col{ max-width: calc(100vw - 90px); }
    .composer{ padding:10px 12px 16px; }
    .suggestions{ flex-direction:column; width:100%; }
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding:18px 16px 8px;
    font-weight:700; font-size:17px; letter-spacing:-0.02em;
  }
  .brand-mark{
    width:26px; height:26px; border-radius:8px;
    object-fit: cover;
    flex-shrink:0;
  }
  .new-chat{
    margin:12px 16px; padding:10px 14px;
    background: var(--accent); color:#fff;
    border:none; border-radius: var(--radius);
    font-weight:600; font-size:14px; cursor:pointer;
    display:flex; align-items:center; gap:8px;
  }
  .new-chat:hover{ background: var(--accent-hover); }
  .conv-list{ flex:1; overflow-y:auto; padding:4px 10px; }
  .conv-item{
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 10px; border-radius:10px; cursor:pointer;
    font-size:13.5px; color:var(--text-muted);
    margin-bottom:2px; gap:6px;
  }
  .conv-item span.title{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .conv-item input.rename-input{
    flex:1; background:var(--surface-2); border:1px solid var(--accent);
    border-radius:6px; font-size:13.5px; color:var(--text); padding:2px 6px;
    font-family:inherit;
  }
  .conv-item:hover{ background: var(--surface-2); }
  .conv-item.active{ background: var(--accent-soft); color:var(--text); font-weight:600; }
  .conv-item .row-actions{ display:flex; gap:2px; opacity:0; flex-shrink:0; }
  .conv-item:hover .row-actions{ opacity:1; }
  .conv-item .row-actions button{
    border:none; background:none; color:var(--text-muted);
    cursor:pointer; font-size:12.5px; padding:2px 4px;
  }
  .conv-item .row-actions button:hover{ color: var(--text); }
  .sidebar-footer{
    padding:12px 16px; border-top:1px solid var(--border);
    display:flex; flex-direction:column; gap:8px;
  }
  .sidebar-footer label{ font-size:11px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .sidebar-footer input, .sidebar-footer select{
    width:100%; padding:8px 10px; border-radius:9px; border:1px solid var(--border);
    background: var(--surface-2); color:var(--text); font-size:13px;
  }
  .theme-toggle{
    background:none; border:1px solid var(--border); border-radius:9px;
    padding:7px; cursor:pointer; color:var(--text-muted); font-size:13px;
  }
  .made-by{
    text-align:center; font-size:11px; color: var(--text-muted);
    padding-top:4px; opacity:.8;
  }

  .main{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar{
    display:flex; align-items:center; gap:12px;
    padding:12px 20px; border-bottom:1px solid var(--border);
  }
  .icon-btn{
    background:none; border:none; cursor:pointer; color:var(--text-muted);
    font-size:18px; padding:4px;
  }
  .topbar .chat-title{ font-weight:600; font-size:15px; }

  .messages{ flex:1; overflow-y:auto; padding: 24px 0 12px; }
  .msg-row{
    max-width: 760px; margin: 0 auto 20px; padding: 0 20px;
    display:flex; gap:12px;
  }
  .msg-row.user{ flex-direction:row-reverse; }
  .avatar{
    width:30px; height:30px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700; color:#fff;
  }
  .avatar.user{ background: var(--user-bubble); color: var(--user-text); }
  .avatar.assistant{ background: linear-gradient(135deg, var(--accent), #9B7CFF); }
  .bubble-col{ display:flex; flex-direction:column; max-width:640px; }
  .msg-row.user .bubble-col{ align-items:flex-end; }
  .bubble{
    padding:11px 15px; border-radius: var(--radius);
    font-size:14.5px; line-height:1.6;
    white-space:pre-wrap; word-wrap:break-word;
  }
  .msg-row.user .bubble{ background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius:4px;}
  .msg-row.assistant .bubble{ background: var(--assistant-bubble); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .bubble pre{
    background:#0F1117; color:#E5E7EB; padding:12px 12px; border-radius:10px;
    overflow-x:auto; font-size:13px; margin:8px 0; position:relative;
  }
  .bubble code{ font-family: "SFMono-Regular", Consolas, monospace; }
  .bubble :not(pre) > code{ background: var(--surface-2); padding:2px 5px; border-radius:5px; font-size:.9em;}
  .code-wrap{ position:relative; }
  .code-copy-btn{
    position:absolute; top:6px; right:6px; background:rgba(255,255,255,.1);
    color:#E5E7EB; border:1px solid rgba(255,255,255,.2); border-radius:6px;
    font-size:11px; padding:3px 8px; cursor:pointer;
  }
  .code-copy-btn:hover{ background:rgba(255,255,255,.2); }

  .attachments{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px; }
  .attachments img{ width:64px; height:64px; object-fit:cover; border-radius:8px; border:1px solid var(--border); }
  .attachment-chip{
    font-size:11.5px; background:var(--surface-2); border:1px solid var(--border);
    border-radius:8px; padding:4px 8px; color:var(--text-muted);
  }

  .msg-actions{ display:flex; gap:10px; margin-top:6px; }
  .msg-actions button{
    background:none; border:none; color:var(--text-muted); font-size:12px;
    cursor:pointer; opacity:.7;
  }
  .msg-actions button:hover{ opacity:1; color:var(--text); }

  .edit-box textarea{
    width:100%; min-width:280px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-family:inherit; font-size:14.5px;
    padding:10px; resize:vertical; min-height:60px;
  }
  .edit-actions{ display:flex; gap:8px; margin-top:6px; justify-content:flex-end; }
  .edit-actions button{
    border:none; border-radius:8px; padding:6px 12px; font-size:12.5px; cursor:pointer; font-weight:600;
  }
  .edit-actions .save-btn{ background:var(--accent); color:#fff; }
  .edit-actions .cancel-btn{ background:var(--surface-2); color:var(--text-muted); }

  .empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--text-muted); text-align:center; gap:10px; padding:20px;
  }
  .empty-state h1{ font-size:22px; color:var(--text); margin:0; }
  .suggestions{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:600px; margin-top:10px;}
  .suggestion{
    border:1px solid var(--border); background:var(--surface); padding:10px 14px;
    border-radius:12px; font-size:13px; cursor:pointer; color:var(--text);
  }
  .suggestion:hover{ background: var(--surface-2); }

  .typing{ display:flex; gap:4px; padding:6px 0; }
  .typing span{
    width:6px; height:6px; border-radius:50%; background: var(--text-muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{ transform:translateY(0); opacity:.5;} 30%{ transform:translateY(-4px); opacity:1;} }

  .composer{ padding:14px 20px 20px; }
  .pending-attachments{
    max-width:760px; margin:0 auto 8px; display:flex; gap:8px; flex-wrap:wrap;
  }
  .pending-attachment{
    display:flex; align-items:center; gap:6px; background:var(--surface);
    border:1px solid var(--border); border-radius:10px; padding:5px 8px; font-size:12px;
  }
  .pending-attachment img{ width:28px; height:28px; object-fit:cover; border-radius:5px; }
  .pending-attachment button{ border:none; background:none; color:var(--text-muted); cursor:pointer; font-size:13px; }

  .composer-inner{
    max-width:760px; margin:0 auto;
    display:flex; align-items:flex-end; gap:8px;
    background: var(--surface); border:1px solid var(--border);
    border-radius: 18px; padding:8px 8px 8px 10px;
  }
  .attach-btn{
    width:34px; height:34px; border-radius:50%; border:none; background:none;
    color:var(--text-muted); cursor:pointer; font-size:18px; flex-shrink:0;
  }
  .attach-btn:hover{ background:var(--surface-2); }
  .composer-inner textarea{
    flex:1; border:none; background:none; resize:none; outline:none;
    color: var(--text); font-family:inherit; font-size:14.5px; line-height:1.5;
    max-height:160px; padding:8px 0;
  }
  .composer-inner textarea::placeholder{ color: var(--text-muted); }
  .send-btn{
    width:36px; height:36px; border-radius:50%; border:none;
    background: var(--accent); color:#fff; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .send-btn.stop{ background: var(--danger); }
  .send-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .hint{ text-align:center; font-size:11px; color: var(--text-muted); margin-top:8px; }
  .key-warning{
    max-width:760px; margin:0 auto 10px; padding:10px 14px;
    background: var(--accent-soft); border:1px solid var(--border);
    border-radius:12px; font-size:13px; color:var(--text-muted); text-align:center;
  }
  .key-warning a{ color: var(--accent); }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background: var(--border); border-radius:8px; }

  .sidebar-backdrop{ display:none; }

  @media (max-width: 768px){
    .sidebar{
      position: fixed; top:0; left:0; height:100vh; height:100dvh; z-index:50;
      box-shadow: 0 0 24px rgba(0,0,0,.2);
    }
    .sidebar-backdrop{
      display:block; position:fixed; inset:0; background:rgba(0,0,0,.4);
      z-index:40; opacity:0; pointer-events:none; transition:opacity .2s ease;
    }
    .sidebar-backdrop.show{ opacity:1; pointer-events:auto; }
    .msg-row{ padding: 0 12px; gap:8px; }
    .bubble-col{ max-width: 78vw; }
    .avatar{ width:26px; height:26px; font-size:12px; }
    .composer{ padding:10px 12px 14px; }
    .topbar{ padding:10px 14px; }
    .suggestions{ max-width: 90vw; }
  }
</style>
</head>
<body data-theme="light">
<div class="app">

  <div class="sidebar" id="sidebar">
    <div class="brand"><img src="logo1.png" alt="Matrix logo" class="brand-mark">Matrix</div>
    <button class="new-chat" id="newChatBtn">＋ New chat</button>
    <div class="conv-list" id="convList"></div>
    <div class="sidebar-footer">
      <label>Model</label>
      <select id="modelSelect">
        <option value="gpt-5.5">Matrix Turbo</option>
        <option value="gpt-5.4">Matrix Pro</option>
        <option value="gpt-5.4-mini">Matrix Fast</option>
        <option value="claude-sonnet-4-6">Matrix Reasoning</option>
        <option value="claude-fable-5">Matrix Vision</option>
      </select>
      <button class="theme-toggle" id="themeToggle">🌙 Dark mode</button>
      <div class="made-by">Made by ABM Mahiuzzaman Muqshit</div>
    </div>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <div class="main">
    <div class="topbar">
      <button class="icon-btn" id="sidebarToggle">☰</button>
      <div class="chat-title" id="chatTitle">New chat</div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="composer">
      <div class="pending-attachments" id="pendingAttachments"></div>
      <div class="composer-inner">
        <button class="attach-btn" id="attachBtn" title="Attach file/image">📎</button>
        <input type="file" id="fileInput" multiple style="display:none" accept="image/*,.txt,.md,.csv,.json,.js,.py,.html,.css">
        <textarea id="input" placeholder="Message Matrix..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn">↑</button>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = "/.netlify/functions/chat";
const STORAGE_KEY = "matrix_conversations_v1";

let conversations = [];
let activeId = null;
let pendingFiles = []; // {name, mime, dataUrl, isImage, textContent}
let currentAbortController = null;
let isStreaming = false;

function uid(){ return Math.random().toString(36).slice(2,10); }

// ---------- Persistence ----------
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ conversations, activeId }));
  }catch(e){ console.warn("Could not save chat history:", e); }
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      const parsed = JSON.parse(raw);
      conversations = parsed.conversations || [];
      activeId = parsed.activeId || (conversations[0] ? conversations[0].id : null);
    }
  }catch(e){ console.warn("Could not load chat history:", e); }
}

// ---------- Conversation management ----------
function newConversation(){
  const conv = { id: uid(), title: "New chat", messages: [] };
  conversations.unshift(conv);
  activeId = conv.id;
  saveState();
  renderSidebar();
  renderMessages();
}
function getActive(){ return conversations.find(c => c.id === activeId); }

function renderSidebar(){
  const list = document.getElementById("convList");
  list.innerHTML = "";
  conversations.forEach(c => {
    const item = document.createElement("div");
    item.className = "conv-item" + (c.id === activeId ? " active" : "");
    item.innerHTML = `
      <span class="title">${escapeHtml(c.title)}</span>
      <div class="row-actions">
        <button class="rename-btn" title="Rename">✎</button>
        <button class="del" title="Delete">✕</button>
      </div>`;
    item.querySelector(".title").onclick = () => { activeId = c.id; saveState(); renderSidebar(); renderMessages(); if (isMobile()) closeSidebar(); };

    item.querySelector(".rename-btn").onclick = (e) => {
      e.stopPropagation();
      const span = item.querySelector(".title");
      const input = document.createElement("input");
      input.className = "rename-input";
      input.value = c.title;
      item.replaceChild(input, span);
      input.focus();
      input.select();
      const commit = () => {
        c.title = input.value.trim() || c.title;
        saveState();
        renderSidebar();
        renderMessages();
      };
      input.onblur = commit;
      input.onkeydown = (ev) => {
        if (ev.key === "Enter") { ev.preventDefault(); commit(); }
        if (ev.key === "Escape") { renderSidebar(); }
      };
    };

    item.querySelector(".del").onclick = (e) => {
      e.stopPropagation();
      conversations = conversations.filter(x => x.id !== c.id);
      if (activeId === c.id) {
        activeId = conversations[0] ? conversations[0].id : null;
        if (!activeId) { newConversation(); return; }
      }
      saveState();
      renderSidebar(); renderMessages();
    };
    list.appendChild(item);
  });
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderMarkdown(text){
  let escaped = escapeHtml(text || "");
  escaped = escaped.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => `<div class="code-wrap"><pre><code>${code}</code></pre><button class="code-copy-btn">Copy</button></div>`);
  escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
  escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  escaped = escaped.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
  return escaped;
}

function attachCodeCopyHandlers(container){
  container.querySelectorAll(".code-wrap").forEach(wrap => {
    const btn = wrap.querySelector(".code-copy-btn");
    const code = wrap.querySelector("code");
    btn.onclick = () => {
      navigator.clipboard.writeText(code.textContent);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1200);
    };
  });
}

function renderAttachmentsPreview(atts){
  if (!atts || atts.length === 0) return "";
  let html = '<div class="attachments">';
  atts.forEach(a => {
    if (a.isImage) html += `<img src="${a.dataUrl}" alt="${escapeHtml(a.name)}">`;
    else html += `<div class="attachment-chip">📄 ${escapeHtml(a.name)}</div>`;
  });
  html += "</div>";
  return html;
}

function renderMessages(){
  const conv = getActive();
  const box = document.getElementById("messages");
  document.getElementById("chatTitle").textContent = conv ? conv.title : "New chat";
  box.innerHTML = "";

  if (!conv || conv.messages.length === 0) {
    box.innerHTML = `
      <div class="empty-state">
        <h1>What can I help with?</h1>
        <div class="suggestions">
          <div class="suggestion">Explain how black holes form</div>
          <div class="suggestion">Write a Python function to sort a list</div>
          <div class="suggestion">Give me dinner ideas for tonight</div>
          <div class="suggestion">Help me draft a polite email</div>
        </div>
      </div>`;
    box.querySelectorAll(".suggestion").forEach(s => {
      s.onclick = () => { document.getElementById("input").value = s.textContent; sendMessage(); };
    });
    return;
  }

  conv.messages.forEach((m, idx) => {
    const row = document.createElement("div");
    row.className = "msg-row " + m.role;
    const isLastAssistant = m.role === "assistant" && idx === conv.messages.length - 1;

    row.innerHTML = `
      <div class="avatar ${m.role}">${m.role === "user" ? "U" : "M"}</div>
      <div class="bubble-col" data-idx="${idx}">
        <div class="msg-content">
          ${renderAttachmentsPreview(m.attachments)}
          <div class="bubble">${renderMarkdown(m.content)}</div>
        </div>
        <div class="msg-actions">
          ${m.role === "assistant" ? `<button class="copy-btn">Copy</button>` : ""}
          ${m.role === "user" ? `<button class="edit-btn">Edit</button>` : ""}
          ${isLastAssistant ? `<button class="regen-btn">↻ Regenerate</button>` : ""}
        </div>
      </div>
    `;
    if (m.role === "assistant") {
      row.querySelector(".copy-btn").onclick = () => navigator.clipboard.writeText(m.content);
    }
    if (m.role === "user") {
      row.querySelector(".edit-btn").onclick = () => startEdit(idx);
    }
    if (isLastAssistant) {
      row.querySelector(".regen-btn").onclick = () => regenerateLast();
    }
    box.appendChild(row);
  });
  attachCodeCopyHandlers(box);
  box.scrollTop = box.scrollHeight;
}

function startEdit(idx){
  const conv = getActive();
  const m = conv.messages[idx];
  const box = document.getElementById("messages");
  const col = box.querySelector(`.bubble-col[data-idx="${idx}"]`);
  const content = col.querySelector(".msg-content");
  content.innerHTML = `
    <div class="edit-box">
      <textarea>${escapeHtml(m.content)}</textarea>
      <div class="edit-actions">
        <button class="cancel-btn">Cancel</button>
        <button class="save-btn">Save & submit</button>
      </div>
    </div>`;
  const textarea = content.querySelector("textarea");
  textarea.focus();
  content.querySelector(".cancel-btn").onclick = () => renderMessages();
  content.querySelector(".save-btn").onclick = () => {
    const newText = textarea.value.trim();
    if (!newText) return;
    conv.messages = conv.messages.slice(0, idx);
    conv.messages.push({ role: "user", content: newText, attachments: m.attachments || [] });
    saveState();
    renderMessages();
    runCompletion();
  };
}

function regenerateLast(){
  const conv = getActive();
  if (!conv || conv.messages.length === 0) return;
  const last = conv.messages[conv.messages.length - 1];
  if (last.role === "assistant") conv.messages.pop();
  saveState();
  renderMessages();
  runCompletion();
}

function showTyping(){
  const box = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row assistant";
  row.id = "typingRow";
  row.innerHTML = `<div class="avatar assistant">M</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}
function removeTyping(){
  const t = document.getElementById("typingRow");
  if (t) t.remove();
}

function setStreamingUI(streaming){
  isStreaming = streaming;
  const sendBtn = document.getElementById("sendBtn");
  sendBtn.textContent = streaming ? "■" : "↑";
  sendBtn.classList.toggle("stop", streaming);
}

// ---------- File attachments ----------
function readFileAsAttachment(file){
  return new Promise((resolve) => {
    const isImage = file.type.startsWith("image/");
    const reader = new FileReader();
    reader.onload = () => {
      if (isImage) {
        resolve({ name: file.name, mime: file.type, dataUrl: reader.result, isImage: true });
      } else {
        resolve({ name: file.name, mime: file.type || "text/plain", dataUrl: null, isImage: false, textContent: reader.result });
      }
    };
    if (isImage) reader.readAsDataURL(file);
    else reader.readAsText(file);
  });
}

function renderPendingAttachments(){
  const wrap = document.getElementById("pendingAttachments");
  wrap.innerHTML = "";
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement("div");
    chip.className = "pending-attachment";
    chip.innerHTML = f.isImage
      ? `<img src="${f.dataUrl}"><span>${escapeHtml(f.name)}</span><button>✕</button>`
      : `<span>📄 ${escapeHtml(f.name)}</span><button>✕</button>`;
    chip.querySelector("button").onclick = () => { pendingFiles.splice(i, 1); renderPendingAttachments(); };
    wrap.appendChild(chip);
  });
}

document.getElementById("attachBtn").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = async (e) => {
  const files = Array.from(e.target.files);
  for (const f of files) {
    const att = await readFileAsAttachment(f);
    pendingFiles.push(att);
  }
  renderPendingAttachments();
  e.target.value = "";
};

// ---------- Sending ----------
function buildApiMessages(conv){
  const identity = {
    role: "system",
    content: "You are Matrix, a helpful AI assistant. Always refer to yourself as Matrix. Never reveal, mention, or confirm the name of the underlying model or company that powers you (for example, do not say GPT, OpenAI, Claude, Anthropic, or Gemini), even if the user asks directly or insists. If asked what model or AI you are, simply say you are Matrix."
  };
  const history = conv.messages.map(m => {
    const imageAtts = (m.attachments || []).filter(a => a.isImage);
    const textAtts = (m.attachments || []).filter(a => !a.isImage);
    let textContent = m.content;
    textAtts.forEach(a => {
      textContent += `\n\n[Attached file: ${a.name}]\n${a.textContent}`;
    });
    if (imageAtts.length > 0) {
      const parts = [{ type: "text", text: textContent }];
      imageAtts.forEach(a => parts.push({ type: "image_url", image_url: { url: a.dataUrl } }));
      return { role: m.role, content: parts };
    }
    return { role: m.role, content: textContent };
  });
  return [identity, ...history];
}

async function sendMessage(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text && pendingFiles.length === 0) return;

  let conv = getActive();
  if (!conv) { newConversation(); conv = getActive(); }
  if (conv.messages.length === 0) conv.title = (text || "New attachment").slice(0, 32);

  conv.messages.push({ role: "user", content: text, attachments: pendingFiles.slice() });
  pendingFiles = [];
  renderPendingAttachments();
  input.value = "";
  input.style.height = "auto";
  saveState();
  renderSidebar();
  renderMessages();
  runCompletion();
}

async function runCompletion(){
  const conv = getActive();
  const model = document.getElementById("modelSelect").value;
  showTyping();
  setStreamingUI(true);

  currentAbortController = new AbortController();

  try {
    const res = await fetch(API_BASE, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: model,
        messages: buildApiMessages(conv),
        stream: true
      }),
      signal: currentAbortController.signal
    });

    if (!res.ok || !res.body) {
      const errText = await res.text().catch(() => "");
      throw new Error("Request failed (" + res.status + "). " + errText.slice(0, 200));
    }

    removeTyping();
    conv.messages.push({ role: "assistant", content: "" });
    renderMessages();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith("data:")) continue;
        const data = trimmed.slice(5).trim();
        if (data === "[DONE]") continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            conv.messages[conv.messages.length - 1].content += delta;
            renderMessages();
          }
        } catch (e) { /* ignore partial chunk */ }
      }
    }
    saveState();
  } catch (err) {
    removeTyping();
    if (err.name === "AbortError") {
      if (conv.messages[conv.messages.length - 1]?.role !== "assistant") {
        conv.messages.push({ role: "assistant", content: "_Stopped._" });
      }
    } else {
      conv.messages.push({ role: "assistant", content: "⚠️ " + err.message });
    }
    saveState();
    renderMessages();
  } finally {
    setStreamingUI(false);
    currentAbortController = null;
  }
}

document.getElementById("sendBtn").onclick = () => {
  if (isStreaming) {
    if (currentAbortController) currentAbortController.abort();
  } else {
    sendMessage();
  }
};
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!isStreaming) sendMessage(); }
});
document.getElementById("input").addEventListener("input", function(){
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 160) + "px";
});
document.getElementById("newChatBtn").onclick = newConversation;

function isMobile(){ return window.innerWidth <= 768; }

function openSidebar(){
  document.getElementById("sidebar").classList.remove("collapsed");
  if (isMobile()) document.getElementById("sidebarBackdrop").classList.add("show");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.add("collapsed");
  document.getElementById("sidebarBackdrop").classList.remove("show");
}

document.getElementById("sidebarToggle").onclick = () => {
  const sidebar = document.getElementById("sidebar");
  if (sidebar.classList.contains("collapsed")) openSidebar();
  else closeSidebar();
};
document.getElementById("sidebarBackdrop").onclick = closeSidebar;

if (isMobile()) closeSidebar();
document.getElementById("themeToggle").onclick = () => {
  const body = document.body;
  const dark = body.getAttribute("data-theme") === "dark";
  body.setAttribute("data-theme", dark ? "light" : "dark");
  document.getElementById("themeToggle").textContent = dark ? "🌙 Dark mode" : "☀️ Light mode";
};

// ---------- Init ----------
loadState();
if (conversations.length === 0) {
  newConversation();
} else {
  renderSidebar();
  renderMessages();
}
</script>
